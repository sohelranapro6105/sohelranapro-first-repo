<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Styled Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 700px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #e94560, #0f3460);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 30px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #e94560, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px 24px;
      flex: 1;
      min-width: 150px;
      transition: transform 0.2s, background 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.12);
    }

    .card .icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .card span {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
    }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(90deg, #e94560, #a78bfa);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 20px rgba(233, 69, 96, 0.35);
      transition: opacity 0.2s, transform 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      opacity: 0.9;
      transform: scale(1.04);
    }

    footer {
      margin-top: 40px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">✦ Welcome</div>
    <h1>Hello, World!</h1>
    <p>This is a beautifully styled static HTML page. Clean design,<br>smooth gradients, and modern card components.</p>

    <div class="cards">
      <div class="card">
        <div class="icon">🎨</div>
        <h3>Design</h3>
        <span>Modern & clean</span>
      </div>
      <div class="card">
        <div class="icon">⚡</div>
        <h3>Fast</h3>
        <span>No dependencies</span>
      </div>
      <div class="card">
        <div class="icon">📱</div>
        <h3>Responsive</h3>
        <span>Works anywhere</span>
      </div>
    </div>

    <button class="btn">Get Started</button>

    <footer>Pure HTML &amp; CSS — No frameworks needed</footer>
  </div>
</body>
</html>
